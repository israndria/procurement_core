name: 📅 Auto Sync Jadwal Tender

# ============================================================
# Scrape jadwal tender SPSE → update Google Calendar otomatis
# Jalan setiap 3 jam, atau bisa trigger manual dari tab Actions
# ============================================================

on:
  schedule:
    - cron: '0 */3 * * *'   # Setiap 3 jam (00:00, 03:00, 06:00, ... UTC)
  workflow_dispatch:          # Trigger manual dari GitHub Actions tab

permissions:
  contents: write

jobs:
  sync:
    name: 🔄 Sync Jadwal ke Google Calendar
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            pandas \
            lxml \
            html5lib \
            beautifulsoup4

      - name: 📅 Jalankan sync jadwal
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python sync_jadwal.py

      - name: 🔑 Update GOOGLE_TOKEN_JSON secret (auto-refresh)
        if: hashFiles('refreshed_token.json') != ''
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          gh secret set GOOGLE_TOKEN_JSON \
            --repo ${{ github.repository }} \
            --body "$(cat refreshed_token.json)"
          echo "✅ Token berhasil di-refresh dan di-update ke secret."

      - name: 💾 Commit database (jika ada perubahan hash)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database_tender.csv sync_log.txt
          # Hanya commit kalau ada perubahan
          git diff --cached --quiet || git commit -m "chore: update database hash & sync log [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
